  <script type="text/babel">

const { useState, useEffect, useCallback } = React;

// ─── UTILITY FUNCTIONS ───────────────────────────────────────────────────────
const getRarityColor = (r) => RARITY_COLOR[r] || "#7A9B6A";
const getRarityLabel = (r) => RARITY[r] || r;
const GENERA = [...new Set(SPECIES.map(s => s.genus))];
const ALL_MORPHS = SPECIES.flatMap(s => s.morphs.map(m => ({ ...m, species: s })));

// ─── SVG ISOPOD ILLUSTRATION ─────────────────────────────────────────────────
function IsopodSVG({ color = "#6B6B6B", size = 80, label = "" }) {
  const c = color;
  const dark = "#1a1a1a";
  const light = color + "AA";
  return (
    <svg width={size} height={size * 0.7} viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id={`g${label}`} cx="50%" cy="40%" r="60%">
          <stop offset="0%" stopColor={light} />
          <stop offset="100%" stopColor={c} />
        </radialGradient>
      </defs>
      <ellipse cx="60" cy="42" rx="52" ry="22" fill={`url(#g${label})`} stroke={dark} strokeWidth="1.2"/>
      {[15,25,35,45,55,65,75,85,95].map((x,i) => (
        <ellipse key={i} cx={x} cy="42" rx="7" ry="21" fill="none" stroke={dark} strokeWidth="0.6" opacity="0.5"/>
      ))}
      <ellipse cx="10" cy="42" rx="12" ry="16" fill={c} stroke={dark} strokeWidth="1.2"/>
      <circle cx="6" cy="36" r="2.5" fill={dark}/>
      <circle cx="14" cy="36" r="2.5" fill={dark}/>
      <circle cx="6.8" cy="35.2" r="0.8" fill="white" opacity="0.6"/>
      <line x1="8" y1="28" x2="2" y2="18" stroke={dark} strokeWidth="1" strokeLinecap="round"/>
      <line x1="12" y1="28" x2="18" y2="16" stroke={dark} strokeWidth="1" strokeLinecap="round"/>
      {[20,30,40,50,60,70,80].map((x,i) => (
        <g key={i}>
          <line x1={x} y1="58" x2={x-4} y2="68" stroke={dark} strokeWidth="0.8"/>
          <line x1={x+5} y1="58" x2={x+9} y2="68" stroke={dark} strokeWidth="0.8"/>
        </g>
      ))}
      <ellipse cx="112" cy="42" rx="9" ry="8" fill={c} stroke={dark} strokeWidth="1"/>
    </svg>
  );
}

// ─── TRADING CARD COMPONENT ──────────────────────────────────────────────────
function TradingCard({ item, isSpecies = false, flipped, onClick }) {
  const rColor = getRarityColor(item.rarity);
  const cardNum = item.card || item.id;
  const name = isSpecies ? `${item.genus} ${item.species}` : item.name;
  const subName = isSpecies ? item.common : (item.species ? `${item.species.genus} ${item.species.species}` : "");
  const hex = isSpecies ? (item.morphs[0]?.hex || "#6B6B6B") : item.hex;

  return (
    <div onClick={onClick} style={{ width:160, minWidth:160, height:240, cursor:"pointer", perspective:800, flexShrink:0 }}>
      <div style={{
        width:"100%", height:"100%", position:"relative",
        transformStyle:"preserve-3d",
        transform: flipped ? "rotateY(180deg)" : "rotateY(0deg)",
        transition:"transform 0.5s cubic-bezier(0.4,0,0.2,1)"
      }}>
        <div style={{
          position:"absolute", inset:0, backfaceVisibility:"hidden",
          borderRadius:12, overflow:"hidden",
          background:`linear-gradient(160deg, ${rColor}22, #1a160e)`,
          border:`2px solid ${rColor}66`,
          boxShadow:`0 4px 24px ${rColor}44, inset 0 1px 0 ${rColor}44`
        }}>
          <div style={{ background:rColor, padding:"3px 8px", textAlign:"center" }}>
            <span style={{ color:"#fff", fontSize:9, fontFamily:"serif", letterSpacing:1 }}>{getRarityLabel(item.rarity)}</span>
          </div>
          <div style={{ padding:"4px 8px 0", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span style={{ color:rColor, fontSize:9, fontFamily:"monospace" }}>{cardNum}</span>
            <span style={{ color:"#7A6A58", fontSize:8 }}>{isSpecies ? "SPECIES" : "MORPH"}</span>
          </div>
          <div style={{
            margin:"6px 10px", height:90, borderRadius:8, overflow:"hidden",
            background:`radial-gradient(ellipse at center, ${hex}33 0%, #0d0b08 70%)`,
            display:"flex", alignItems:"center", justifyContent:"center",
            border:`1px solid ${rColor}33`
          }}>
            <IsopodSVG color={hex} size={90} label={item.id} />
          </div>
          <div style={{ padding:"4px 8px" }}>
            <div style={{ color:"#F0E8D0", fontSize:11, fontFamily:"Georgia, serif", fontWeight:"bold", lineHeight:1.2 }}>{name}</div>
            <div style={{ color:"#9A8878", fontSize:9, marginTop:2 }}>{subName}</div>
          </div>
          {!isSpecies && (
            <div style={{ padding:"0 8px", display:"flex", alignItems:"center", gap:6 }}>
              <div style={{ width:16, height:16, borderRadius:3, background:hex, border:"1px solid #ffffff33" }}/>
              <span style={{ color:"#7A6A58", fontSize:8, fontFamily:"monospace" }}>{hex}</span>
            </div>
          )}
          <div style={{ padding:"2px 8px" }}>
            <span style={{ color:"#6A5848", fontSize:8 }}>{isSpecies ? item.origin : item.year}</span>
          </div>
          <div style={{ textAlign:"center", padding:"4px 0 2px", color:"#5A4A38", fontSize:7 }}>tap to flip</div>
        </div>
        <div style={{
          position:"absolute", inset:0, backfaceVisibility:"hidden",
          transform:"rotateY(180deg)", borderRadius:12, overflow:"hidden",
          background:"#0d0b08", border:`2px solid ${rColor}66`, padding:10, boxSizing:"border-box"
        }}>
          <div style={{ color:rColor, fontSize:10, fontFamily:"serif", letterSpacing:1, marginBottom:4 }}>DATA SHEET</div>
          <div style={{ color:"#F0E8D0", fontSize:10, fontWeight:"bold", fontFamily:"Georgia,serif" }}>{name}</div>
          <div style={{ color:"#9A8878", fontSize:8, marginBottom:6 }}>{subName}</div>
          {isSpecies ? (
            <div style={{ fontSize:8, lineHeight:1.8, color:"#C8B8A0" }}>
              <div>📏 {item.size}</div>
              <div>🌍 {item.origin}</div>
              <div>🌡️ {item.care.temp}</div>
              <div>💧 {item.care.humidity}</div>
              <div>🥗 {item.care.diet}</div>
              <div style={{ marginTop:4, color:"#9A8878", fontSize:7, lineHeight:1.5 }}>{item.notes?.substring(0,80)}…</div>
            </div>
          ) : (
            <div style={{ fontSize:8, lineHeight:1.8, color:"#C8B8A0" }}>
              <div style={{ display:"flex", alignItems:"center", gap:4, marginBottom:4 }}>
                <div style={{ width:14, height:14, borderRadius:3, background:item.hex, border:"1px solid #ffffff33", flexShrink:0 }}/>
                <span style={{ fontFamily:"monospace", color:"#9A8878" }}>{item.hex}</span>
              </div>
              <div>📅 {item.year}</div>
              <div style={{ marginTop:2, color:"#A09080", fontSize:7, lineHeight:1.5 }}>{item.desc?.substring(0,100)}</div>
              {item.genetics && <div style={{ marginTop:4, color:"#7A9B6A", fontSize:7 }}>🧬 {item.genetics?.substring(0,60)}</div>}
              {item.breeder && <div style={{ marginTop:2, color:"#7A8A9A", fontSize:7 }}>👤 {item.breeder}</div>}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

            { icon:"⚡", text:"P. scaber Lava — ONLY co-dominant gene currently known in isopods" },
            { icon:"🔵", text:"O. asellus Mardi Gras Dalmatian — first ever O. asellus morph (Kyle/InvertDude, 2016)" },
            { icon:"🟣", text:"A. vulgare Magic Potion — from Japan, most coveted vulgare morph globally" },
            { icon:"🟠", text:"P. scaber Orange Dalmatian — first documented F2 cross morph (Ryan Orr)" },
            { icon:"👁️", text:"T. tomentosa — all-female parthenogenetic species (no males needed)" },

  // ── DATABASE ────────────────────────────────────────────────────────────────
  const DatabaseSection = () => {
    if (selectedMorph) {
      const s = selectedMorph.species || SPECIES.find(sp => sp.morphs.some(m => m.id === selectedMorph.id));
      return (
        <div style={S.section}>
          <button onClick={() => setSelectedMorph(null)} style={{ ...S.btn(), marginBottom:12 }}>← Back</button>
          <div style={{ ...S.card, borderColor: getRarityColor(selectedMorph.rarity)+"88" }}>
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12 }}>
              <IsopodSVG color={selectedMorph.hex} size={70} label={selectedMorph.id} />
              <div>
                <div style={{ color:"#7A6A58", fontSize:10 }}>{selectedMorph.card} • {s?.genus} {s?.species}</div>
                <div style={{ color:"#F0E8D0", fontSize:18, fontWeight:"bold" }}>{selectedMorph.name}</div>
                <span style={S.pill(getRarityColor(selectedMorph.rarity))}>{getRarityLabel(selectedMorph.rarity)}</span>
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
              <div style={{ width:32, height:32, borderRadius:6, background:selectedMorph.hex, border:"1px solid #ffffff22" }}/>
              <span style={{ color:"#7A6A58", fontFamily:"monospace", fontSize:13 }}>{selectedMorph.hex}</span>
              <span style={{ color:"#9A8878", fontSize:11 }}>{selectedMorph.year}</span>
            </div>
            <div style={{ marginBottom:12, color:"#C8B8A0", fontSize:12, lineHeight:1.6 }}>{selectedMorph.desc}</div>
            <div style={{ ...S.card, background:"#0d0b08", marginBottom:8 }}>
              <div style={{ color:"#7A9B6A", fontSize:11, marginBottom:4 }}>🧬 Genetics</div>
              <div style={{ color:"#A0B890", fontSize:12, lineHeight:1.5 }}>{selectedMorph.genetics}</div>
            </div>
            <div style={{ ...S.card, background:"#0d0b08" }}>
              <div style={{ color:"#7A8A9A", fontSize:11, marginBottom:4 }}>👤 Breeder / Origin</div>
              <div style={{ color:"#A0A8B0", fontSize:12 }}>{selectedMorph.breeder}</div>
            </div>
          </div>
        </div>
      );
    }
    if (selectedSpecies) {
      const s = selectedSpecies;
      return (
        <div style={S.section}>
          <button onClick={() => setSelectedSpecies(null)} style={{ ...S.btn(), marginBottom:12 }}>← Database</button>
          <div style={{ display:"flex", gap:12, alignItems:"flex-start", marginBottom:12, flexWrap:"wrap" }}>
            <IsopodSVG color={s.morphs[0]?.hex || "#6B6B6B"} size={80} label={s.id} />
            <div style={{ flex:1, minWidth:180 }}>
              <div style={{ color:"#7A6A58", fontSize:10 }}>{s.card} • {s.genus}</div>
              <div style={{ color:"#F0E8D0", fontSize:20, fontFamily:"Georgia,serif", fontStyle:"italic" }}>{s.genus} {s.species}</div>
              <div style={{ color:"#C8943A", fontSize:13 }}>"{s.common}"</div>
              <div style={{ display:"flex", gap:6, marginTop:6, flexWrap:"wrap" }}>
                <span style={S.pill(getRarityColor(s.rarity))}>{getRarityLabel(s.rarity)}</span>
                <span style={{ ...S.pill("#7A6A58"), background:"#2a231a" }}>📏 {s.size}</span>
              </div>
            </div>
          </div>
          <div style={{ display:"flex", gap:6, marginBottom:12 }}>
            {["morphs","care","biology"].map(t => (
              <button key={t} onClick={() => setSpeciesTab(t)} style={S.tab(speciesTab===t)}>
                {t==="morphs" ? "🎨 Morphs" : t==="care" ? "🌿 Care" : "🔬 Biology"}
              </button>
            ))}
          </div>
          {speciesTab==="morphs" && (
            <div>
              <div style={{ color:"#7A6A58", fontSize:11, marginBottom:8 }}>{s.morphs.length} morphs documented</div>
              {s.morphs.map(m => (
                <div key={m.id} onClick={() => setSelectedMorph({ ...m, species:s })}
                  style={{ ...S.card, display:"flex", gap:10, alignItems:"center", cursor:"pointer", borderColor:getRarityColor(m.rarity)+"44" }}>
                  <div style={{ width:36, height:36, borderRadius:6, background:m.hex, border:"1px solid #ffffff22", flexShrink:0 }}/>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ color:"#F0E8D0", fontSize:13 }}>{m.name}</div>
                    <div style={{ color:"#7A6A58", fontSize:10 }}>{m.card} • {m.year}</div>
                    <div style={{ color:"#A09080", fontSize:10, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{m.desc}</div>
                  </div>
                  <span style={S.pill(getRarityColor(m.rarity))}>{m.rarity}</span>
                </div>
              ))}
            </div>
          )}
          {speciesTab==="care" && (
            <div style={S.card}>
              <div style={S.h3}>🌿 Care Requirements</div>
              <div style={{ color:"#C8B8A0", fontSize:12 }}>
                <div style={{ marginBottom:4 }}>🌍 <strong>Origin:</strong> {s.origin}</div>
                {Object.entries(s.care).map(([k,v]) => (
                  <div key={k} style={{ marginBottom:4 }}><span style={{ color:"#9A8878", textTransform:"capitalize" }}>{k}: </span><span>{v}</span></div>
                ))}
                <div style={{ marginTop:10, padding:10, background:"#0d0b08", borderRadius:6, color:"#A09080", lineHeight:1.6 }}>💡 {s.notes}</div>
              </div>
            </div>
          )}
          {speciesTab==="biology" && (
            <div style={S.card}>
              <div style={S.h3}>🔬 Biology</div>
              <div style={{ color:"#C8B8A0", fontSize:12 }}>
                {Object.entries(s.biology).map(([k,v]) => (
                  <div key={k} style={{ marginBottom:6, display:"flex", justifyContent:"space-between" }}>
                    <span style={{ color:"#9A8878", textTransform:"capitalize" }}>{k.replace(/([A-Z])/g, ' $1')}</span>
                    <span style={{ textAlign:"right" }}>{v}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }
    return (
      <div style={S.section}>
        <h1 style={S.h1}>📚 Database</h1>
        <div style={{ marginBottom:12 }}>
          <input placeholder="Search species..." value={search} onChange={e=>setSearch(e.target.value)} style={{ ...S.input, marginBottom:8 }} />
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {["All",...GENERA].map(g => (
              <button key={g} onClick={() => setGenusFilter(g)} style={S.tab(genusFilter===g)}>{g}</button>
            ))}
          </div>
        </div>
        <div style={{ color:"#7A6A58", fontSize:11, marginBottom:8 }}>{filteredSpecies.length} species</div>
        <div style={S.grid}>
          {filteredSpecies.map(s => (
            <div key={s.id} onClick={() => { setSelectedSpecies(s); setSpeciesTab("morphs"); }} style={S.speciesCard(s)}>
              <IsopodSVG color={s.morphs[0]?.hex || "#6B6B6B"} size={60} label={s.id} />
              <div style={{ color:"#F0E8D0", fontSize:11, fontFamily:"Georgia,serif", fontStyle:"italic", marginTop:4 }}>{s.genus}</div>
              <div style={{ color:"#9A8878", fontSize:10 }}>{s.species}</div>
              <div style={{ color:"#C8943A", fontSize:10, marginTop:2 }}>"{s.common}"</div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:6 }}>
                <span style={S.pill(getRarityColor(s.rarity))}>{s.rarity}</span>
                <span style={{ color:"#5A4A38", fontSize:9 }}>{s.morphs.length} morphs</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  };

  // ── GALLERY ─────────────────────────────────────────────────────────────────
  const GallerySection = () => (
    <div style={S.section}>
      <h1 style={S.h1}>🎴 Card Gallery</h1>
      <div style={{ ...S.card, background:"#1a1408", borderColor:"#C8943A44", marginBottom:16, textAlign:"center" }}>
        <div style={{ color:"#C8943A", fontSize:13, marginBottom:4 }}>📦 Trading Card Series</div>
        <div style={{ color:"#7A6A58", fontSize:11, marginBottom:8 }}>Physical illustrated cards — Kickstarter & Etsy</div>
        <div style={{ display:"flex", gap:8, justifyContent:"center" }}>
          <button style={{ ...S.btn(), fontSize:11 }}>🚀 Kickstarter</button>
          <button style={{ ...S.btn("#7A9B6A"), fontSize:11 }}>🛒 Etsy Shop</button>
        </div>
      </div>
      <div style={{ display:"flex", gap:6, marginBottom:12, flexWrap:"wrap" }}>
        {["All","Species","Morphs"].map(f => (
          <button key={f} onClick={() => setCardFilter(f)} style={S.tab(cardFilter===f)}>{f}</button>
        ))}
        <input placeholder="Search cards..." value={cardSearch} onChange={e=>setCardSearch(e.target.value)} style={{ ...S.input, flex:1, minWidth:120 }} />
      </div>
      <div style={{ color:"#7A6A58", fontSize:11, marginBottom:8 }}>{filteredCards.length} cards</div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:12 }}>
        {filteredCards.map(({ key, item, isSpecies }) => (
          <TradingCard key={key} item={item} isSpecies={isSpecies} flipped={flippedCards[key]} onClick={() => toggleCard(key)} />
        ))}
      </div>
    </div>
  );

  // ── PROJECTS ─────────────────────────────────────────────────────────────────
  const ProjectsSection = () => {
    const LOG_TYPES = ["observation","birth","feeding","mating","moult","death","maintenance","transfer","note"];
    const LOG_ICONS = { observation:"👁️", birth:"🐣", feeding:"🥗", mating:"💞", moult:"🔄", death:"💀", maintenance:"🔧", transfer:"📦", note:"📝" };

    const runMorphCheck = async (spId, parentMorphId, description) => {
      setMorphCheckLoading(true);
      setMorphCheckResult(null);
      const sp = SPECIES.find(s => s.id === spId);
      if (!sp) { setMorphCheckLoading(false); return; }
      const knownMorphs = sp.morphs.map(m => `${m.name} (${m.id}): ${m.genetics} — ${m.desc}`).join("\n");
      const systemPrompt = `You are an expert isopod genetics analyst for the IsoMorphs registry. You help breeders determine whether offspring colouration represents a known morph, a variation of a known morph, or potentially a new undocumented morph.

SPECIES: ${sp.genus} ${sp.species} (${sp.common})
PARENT MORPH: ${sp.morphs.find(m=>m.id===parentMorphId)?.name || "Unknown/Wild type"}
KNOWN MORPHS FOR THIS SPECIES:
${knownMorphs}

Respond ONLY with valid JSON (no markdown) with these fields:
- verdict: "Known Morph" | "Variation of Known" | "Possible New Morph" | "Likely New Morph"
- matchedMorphId: morph id if matched or null
- matchedMorphName: name if matched or null
- confidence: "High"|"Medium"|"Low"
- explanation: 2-3 sentences
- geneticsHypothesis: what genetic mechanism might explain this if new
- recommendedNextSteps: practical advice
- noveltyScore: 0-10`;
      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", { method:"POST", headers:{ "Content-Type":"application/json" },
          body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:800, system:systemPrompt, messages:[{ role:"user", content:`Offspring description: ${description}` }] }) });
        const data = await res.json();
        const text = data.content?.map(c=>c.text||"").join("").trim();
        const clean = text.replace(/```json|```/g,"").trim();
        setMorphCheckResult(JSON.parse(clean));
      } catch(e) { setMorphCheckResult({ verdict:"Error", explanation:"Could not analyse. Please try again.", noveltyScore:0 }); }
      setMorphCheckLoading(false);
    };

    if (selectedProject !== null) {
      const p = projects[selectedProject];
      const sp = SPECIES.find(s => s.id === p.speciesId);
      const m = sp?.morphs.find(m => m.id === p.morphId);
      const logs = projectLogs[selectedProject] || [];
      const addLog = () => {
        if (!newLog.note.trim()) return;
        const updated = { ...projectLogs, [selectedProject]: [...logs, { ...newLog, date:new Date().toLocaleDateString() }] };
        saveLogs(updated);
        setNewLog({ type:"observation", note:"" });
      };
      const novelty = morphCheckResult?.noveltyScore || 0;
      const vc = novelty >= 7 ? "#C84A4A" : novelty >= 4 ? "#C8943A" : "#7A9B6A";
      return (
        <div style={S.section}>
          <button onClick={() => { setSelectedProject(null); setMorphCheckResult(null); setNewMorphDesc(""); }} style={{ ...S.btn(), marginBottom:12 }}>← Projects</button>
          <div style={S.card}>
            <div style={{ display:"flex", gap:10, alignItems:"center" }}>
              {sp && <IsopodSVG color={m?.hex || sp.morphs[0]?.hex || "#6B6B6B"} size={50} label={`proj_${selectedProject}`} />}
              <div>
                <div style={{ color:"#F0E8D0", fontSize:16 }}>{p.name}</div>
                <div style={{ color:"#9A8878", fontSize:11 }}>{sp ? `${sp.genus} ${sp.species}` : "No species linked"}{m ? ` — ${m.name}` : ""}</div>
              </div>
            </div>
            {p.notes && <div style={{ marginTop:8, color:"#A09080", fontSize:11, lineHeight:1.5 }}>{p.notes}</div>}
          </div>
          {sp && (
            <div style={{ ...S.card, background:"#0d0b08", marginBottom:12 }}>
              <div style={{ color:"#7A9B6A", fontSize:11, marginBottom:4 }}>Care Reference</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:8, fontSize:10, color:"#9A8878" }}>
                <span>🌡️ {sp.care.temp}</span><span>💧 {sp.care.humidity}</span><span>🌬️ {sp.care.ventilation}</span>
              </div>
            </div>
          )}
          <div style={S.card}>
            <div style={S.h3}>Add Entry</div>
            <div style={{ display:"flex", gap:6, marginBottom:8, flexWrap:"wrap" }}>
              {LOG_TYPES.map(t => (
                <button key={t} onClick={() => setNewLog(l => ({ ...l, type:t }))} style={{ ...S.tab(newLog.type===t), fontSize:10, padding:"4px 8px" }}>
                  {LOG_ICONS[t]} {t}
                </button>
              ))}
            </div>
            <textarea value={newLog.note} onChange={e => setNewLog(l => ({ ...l, note:e.target.value }))} placeholder="Entry notes..." rows={3} style={{ ...S.input, resize:"vertical", marginBottom:8 }} />
            <button onClick={addLog} style={S.btn()}>Add Entry</button>
          </div>
          {sp && (
            <div style={{ ...S.card, borderColor:"#C8943A44" }}>
              <div style={{ display:"flex", gap:6, alignItems:"center", marginBottom:6 }}>
                <span style={{ fontSize:16 }}>✨</span>
                <div style={S.h3}>New Morph Checker</div>
              </div>
              <div style={{ color:"#7A6A58", fontSize:10, marginBottom:10, lineHeight:1.5 }}>
                Have offspring that look different? Describe the colouration and we'll check it against all known morphs for this species.
              </div>
              <textarea value={newMorphDesc} onChange={e => setNewMorphDesc(e.target.value)} placeholder="Describe offspring colouration…" rows={4} style={{ ...S.input, resize:"vertical", marginBottom:10 }} />
              <button onClick={() => runMorphCheck(sp.id, p.morphId, newMorphDesc)} disabled={morphCheckLoading || !newMorphDesc.trim()} style={{ ...S.btn("#7A9B6A"), opacity:newMorphDesc.trim() ? 1 : 0.5 }}>
                {morphCheckLoading ? "Analysing…" : "✨ Check Morph"}
              </button>
              {morphCheckResult && (
                <div style={{ marginTop:12 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                    <span style={{ color: morphCheckResult.verdict==="Known Morph" ? "#7A9B6A" : morphCheckResult.verdict==="Variation of Known" ? "#4A7CA8" : morphCheckResult.verdict==="Possible New Morph" ? "#C8943A" : "#C84A4A", fontSize:13, fontWeight:"bold" }}>{morphCheckResult.verdict}</span>
                    <div style={{ display:"flex", gap:3 }}>
                      {[...Array(10)].map((_,i) => (
                        <div key={i} style={{ width:8, height:8, borderRadius:2, background: i < novelty ? vc : "#2A231A" }}/>
                      ))}
                      <span style={{ color:vc, fontSize:11, fontWeight:"bold", marginLeft:4 }}>{novelty}/10</span>
                    </div>
                  </div>
                  {morphCheckResult.matchedMorphName && (
                    <div style={{ marginBottom:8, padding:8, background:"#13100c", borderRadius:6 }}>
                      <span style={{ color:"#7A9B6A", fontSize:10 }}>Matched to: </span>
                      <span style={{ color:"#F0E8D0", fontSize:12 }}>{morphCheckResult.matchedMorphName}</span>
                    </div>
                  )}
                  <div style={{ color:"#C8B8A0", fontSize:11, lineHeight:1.6, marginBottom:8 }}>{morphCheckResult.explanation}</div>
                  {morphCheckResult.geneticsHypothesis && (
                    <div style={{ marginBottom:8 }}>
                      <div style={{ color:"#7A9B6A", fontSize:10, marginBottom:2 }}>🧬 Genetics hypothesis</div>
                      <div style={{ color:"#9A9080", fontSize:11, lineHeight:1.5 }}>{morphCheckResult.geneticsHypothesis}</div>
                    </div>
                  )}
                  {morphCheckResult.recommendedNextSteps && (
                    <div style={{ padding:8, background:"#13100c", borderRadius:6 }}>
                      <div style={{ color:"#C8943A", fontSize:10, marginBottom:2 }}>📋 Next steps</div>
                      <div style={{ color:"#A09080", fontSize:11, lineHeight:1.5 }}>{morphCheckResult.recommendedNextSteps}</div>
                    </div>
                  )}
                  {(morphCheckResult.verdict === "Possible New Morph" || morphCheckResult.verdict === "Likely New Morph") && (
                    <div style={{ marginTop:10, padding:8, background:"#C8943A11", borderRadius:6, border:"1px solid #C8943A44" }}>
                      <div style={{ color:"#C8943A", fontSize:11, fontWeight:"bold", marginBottom:4 }}>⭐ Potential discovery!</div>
                      <div style={{ color:"#A09080", fontSize:10, lineHeight:1.5 }}>Document everything carefully — photos at each instar, parent crosses, and isolation progress.</div>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}
          {logs.length > 0 && (
            <div style={S.card}>
              <div style={S.h3}>Log History</div>
              {[...logs].reverse().map((l,i) => (
                <div key={i} style={{ marginBottom:8, paddingBottom:8, borderBottom:"1px solid #2A231A" }}>
                  <div style={{ display:"flex", justifyContent:"space-between" }}>
                    <span style={{ color:"#C8943A", fontSize:11 }}>{LOG_ICONS[l.type]} {l.type}</span>
                    <span style={{ color:"#5A4A38", fontSize:10 }}>{l.date}</span>
                  </div>
                  <div style={{ color:"#C8B8A0", fontSize:11, marginTop:2, lineHeight:1.4 }}>{l.note}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    return (
      <div style={S.section}>
        <h1 style={S.h1}>🧬 My Projects</h1>
        <button onClick={() => setShowAddProject(true)} style={{ ...S.btn(), marginBottom:12 }}>+ New Project</button>
        {showAddProject && (
          <div style={{ ...S.card, borderColor:"#C8943A44", marginBottom:12 }}>
            <div style={S.h3}>New Project</div>
            <input placeholder="Project name" value={newProject.name} onChange={e=>setNewProject(p=>({...p,name:e.target.value}))} style={{ ...S.input, marginBottom:8 }} />
            <select value={newProject.speciesId} onChange={e=>setNewProject(p=>({...p,speciesId:e.target.value,morphId:""}))} style={{ ...S.input, marginBottom:8 }}>
              <option value="">Select species…</option>
              {SPECIES.map(s => <option key={s.id} value={s.id}>{s.genus} {s.species} — {s.common}</option>)}
            </select>
            {newProject.speciesId && (
              <select value={newProject.morphId} onChange={e=>setNewProject(p=>({...p,morphId:e.target.value}))} style={{ ...S.input, marginBottom:8 }}>
                <option value="">Select morph (optional)…</option>
                {SPECIES.find(s=>s.id===newProject.speciesId)?.morphs.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
              </select>
            )}
            <textarea placeholder="Notes…" value={newProject.notes} onChange={e=>setNewProject(p=>({...p,notes:e.target.value}))} rows={2} style={{ ...S.input, resize:"vertical", marginBottom:8 }} />
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={() => { if (!newProject.name.trim()) return; saveProjects([...projects, newProject]); setNewProject({ name:"", speciesId:"", morphId:"", notes:"" }); setShowAddProject(false); }} style={S.btn()}>Create</button>
              <button onClick={() => setShowAddProject(false)} style={{ ...S.btn("#4A3A2A") }}>Cancel</button>
            </div>
          </div>
        )}
        {projects.length === 0 && !showAddProject && (
          <div style={{ ...S.card, background:"#0d0b08", textAlign:"center", padding:24 }}>
            <div style={{ color:"#5A4A38", fontSize:13 }}>No projects yet</div>
            <div style={{ color:"#3A2A1A", fontSize:11, marginTop:4 }}>Create a project to start tracking a colony or breeding programme</div>
          </div>
        )}
        {projects.map((p,i) => {
          const sp = SPECIES.find(s => s.id === p.speciesId);
          const m = sp?.morphs.find(mo => mo.id === p.morphId);
          return (
            <div key={i} onClick={() => setSelectedProject(i)} style={{ ...S.card, cursor:"pointer", display:"flex", gap:10, alignItems:"center" }}>
              {sp && <IsopodSVG color={m?.hex || sp.morphs[0]?.hex || "#6B6B6B"} size={40} label={`list_${i}`} />}
              <div style={{ flex:1 }}>
                <div style={{ color:"#F0E8D0", fontSize:13 }}>{p.name}</div>
                <div style={{ color:"#7A6A58", fontSize:10 }}>{sp ? `${sp.genus} ${sp.species}` : "No species"}{m ? ` — ${m.name}` : ""}</div>
                <div style={{ color:"#5A4A38", fontSize:10 }}>{(projectLogs[i]||[]).length} entries</div>
              </div>
            </div>
          );
        })}
      </div>
    );
  };

  // ── IDENTIFY ─────────────────────────────────────────────────────────────────
  const IDSection = () => {
    const VERDICT_COLOR = { "Known Morph":"#7A9B6A", "Variation of Known":"#4A7CA8", "Possible New Morph":"#C8943A", "Likely New Morph":"#C84A4A" };
    const runIdentify = async () => {
      setIdLoading(true); setIdResults(null); setIdError(null);
      const allMorphData = SPECIES.map(s => `${s.genus} ${s.species} (${s.common}): ${s.morphs.map(m=>`${m.name}[${m.id}] — ${m.hex} — ${m.desc?.substring(0,60)}`).join("; ")}`).join("\n");
      const systemPrompt = `You are an expert isopod identification assistant for the IsoMorphs registry. Given a description or image of an isopod, identify the most likely species and colour morph from the database.

DATABASE:
${allMorphData}

Return ONLY valid JSON (no markdown): { "matches": [ { "speciesId": "001", "morphId": "001b", "confidence": "High", "confidencePc": 87, "reasoning": "...", "distinguishingFeatures": "...", "alternativeNotes": "..." } ] }
Return up to 5 matches, best first.`;
      try {
        const messages = idImageB64
          ? [{ role:"user", content:[{ type:"image", source:{ type:"base64", media_type:"image/jpeg", data:idImageB64 } }, { type:"text", text: idDescription || "Identify this isopod" }] }]
          : [{ role:"user", content: idDescription }];
        const res = await fetch("https://api.anthropic.com/v1/messages", { method:"POST", headers:{ "Content-Type":"application/json" },
          body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1200, system:systemPrompt, messages }) });
        const data = await res.json();
        const text = data.content?.map(c=>c.text||"").join("").trim();
        const clean = text.replace(/```json|```/g,"").trim();
        const parsed = JSON.parse(clean);
        setIdResults(parsed.matches || []);
      } catch(e) { setIdError("Could not identify. Please try again with more detail."); }
      setIdLoading(false);
    };
    return (
      <div style={S.section}>
        <h1 style={S.h1}>🔍 Identify</h1>
        <div style={{ color:"#7A6A58", fontSize:12, marginBottom:16, lineHeight:1.5 }}>Describe your isopod or upload a photo and we'll match it against all 33 species and 109 morphs.</div>
        <div style={{ display:"flex", gap:8, marginBottom:12 }}>
          <button onClick={()=>setIdMode("describe")} style={S.tab(idMode==="describe")}>✏️ Describe</button>
          <button onClick={()=>setIdMode("photo")} style={S.tab(idMode==="photo")}>📷 Photo</button>
        </div>
        {idMode==="describe" ? (
          <div>
            <textarea value={idDescription} onChange={e=>setIdDescription(e.target.value)} placeholder="Describe your isopod — colour, pattern, size, texture, behaviour, origin…" rows={5} style={{ ...S.input, resize:"vertical", marginBottom:10 }} />
            <button onClick={runIdentify} disabled={idLoading || !idDescription.trim()} style={{ ...S.btn(), opacity:idDescription.trim() ? 1 : 0.5 }}>
              {idLoading ? "Identifying…" : "🔍 Identify"}
            </button>
          </div>
        ) : (
          <div>
            <input type="file" accept="image/*" onChange={e => {
              const f = e.target.files[0]; if (!f) return;
              setIdImage(URL.createObjectURL(f));
              const reader = new FileReader();
              reader.onload = ev => setIdImageB64(ev.target.result.split(",")[1]);
              reader.readAsDataURL(f);
            }} style={{ ...S.input, marginBottom:8 }} />
            {idImage && <img src={idImage} alt="Upload" style={{ width:"100%", maxHeight:200, objectFit:"contain", borderRadius:8, marginBottom:8, border:"1px solid #2A231A" }} />}
            <textarea value={idDescription} onChange={e=>setIdDescription(e.target.value)} placeholder="Optional: add description to help identification…" rows={2} style={{ ...S.input, resize:"vertical", marginBottom:10 }} />
            <button onClick={runIdentify} disabled={idLoading || (!idDescription.trim() && !idImageB64)} style={{ ...S.btn(), opacity:(idDescription.trim() || idImageB64) ? 1 : 0.5 }}>
              {idLoading ? "Identifying…" : "🔍 Identify"}
            </button>
          </div>
        )}
        {idLoading && (
          <div style={{ ...S.card, textAlign:"center", padding:24, marginTop:12 }}>
            <div style={{ color:"#C8943A", fontSize:14, marginBottom:8 }}>Searching database…</div>
            <div style={{ color:"#5A4A38", fontSize:11 }}>Comparing against 33 species and 109 morphs</div>
          </div>
        )}
        {idError && <div style={{ ...S.card, borderColor:"#C84A4A66", marginTop:12 }}><div style={{ color:"#C84A4A", fontSize:12 }}>{idError}</div></div>}
        {idResults && idResults.length > 0 && (
          <div style={{ marginTop:12 }}>
            <div style={S.h3}>Results — {idResults.length} possible matches</div>
            {idResults.map((r,i) => {
              const sp = SPECIES.find(s => s.id === r.speciesId);
              const m = sp?.morphs.find(mo => mo.id === r.morphId);
              const confColor = r.confidence==="High" ? "#7A9B6A" : r.confidence==="Medium" ? "#C8943A" : "#9A6A4A";
              return (
                <div key={i} style={{ ...S.card, borderColor:confColor+"66", marginBottom:10 }}>
                  <div style={{ display:"flex", gap:10, alignItems:"flex-start" }}>
                    {sp && <IsopodSVG color={m?.hex || sp.morphs[0]?.hex || "#6B6B6B"} size={54} label={`id_${i}`} />}
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:4 }}>
                        <div>
                          <span style={{ color:"#F0E8D0", fontSize:13, fontStyle:"italic" }}>{sp?.genus} {sp?.species}</span>
                          {m && <span style={{ color:"#C8943A", fontSize:12 }}> — {m.name}</span>}
                        </div>
                        <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                          <span style={{ color:confColor, fontSize:11, fontWeight:"bold" }}>{r.confidencePc}%</span>
                          <span style={S.pill(confColor)}>{r.confidence}</span>
                        </div>
                      </div>
                      {m && (
                        <div style={{ display:"flex", alignItems:"center", gap:6, margin:"4px 0" }}>
                          <div style={{ width:14, height:14, borderRadius:3, background:m.hex, border:"1px solid #ffffff22" }}/>
                          <span style={{ color:"#7A6A58", fontSize:9, fontFamily:"monospace" }}>{m.hex}</span>
                          <span style={S.pill(getRarityColor(m.rarity))}>{getRarityLabel(m.rarity)}</span>
                        </div>
                      )}
                      <div style={{ color:"#C8B8A0", fontSize:11, marginTop:4, lineHeight:1.5 }}>{r.reasoning}</div>
                      {r.distinguishingFeatures && (
                        <div style={{ marginTop:6, padding:6, background:"#0d0b08", borderRadius:6 }}>
                          <span style={{ color:"#7A9B6A", fontSize:10 }}>Key features: </span>
                          <span style={{ color:"#9A9080", fontSize:10 }}>{r.distinguishingFeatures}</span>
                        </div>
                      )}
                      {r.alternativeNotes && <div style={{ marginTop:4, color:"#6A5A48", fontSize:10, fontStyle:"italic" }}>{r.alternativeNotes}</div>}
                      <button onClick={() => { setSection("database"); setSelectedSpecies(sp); setSpeciesTab("morphs"); }} style={{ ...S.btn(), marginTop:8, fontSize:10, padding:"4px 10px" }}>View in Database →</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
        {idResults && idResults.length === 0 && (
          <div style={{ ...S.card, background:"#0d0b08", marginTop:12 }}>
            <div style={{ color:"#5A4A38", fontSize:10, lineHeight:1.5 }}>
              💡 Not finding a match? If your isopod looks genuinely different from all known morphs, it could be a new undiscovered morph. Start a Project and use the New Morph Checker when logging offspring.
            </div>
          </div>
        )}
      </div>
    );
  };

  // ── GENETICS CALCULATOR ──────────────────────────────────────────────────────
  const CalcSection = () => {
    const calcSpecies = SPECIES.find(s => s.id === calcSpeciesId);
    const calcMorphs = calcSpecies?.morphs || [];

    const classifyGenetics = (genetics) => {
      if (!genetics) return "unknown";
      const g = genetics.toLowerCase();
      if (g.includes("co-dominant") || g.includes("codominant")) return "codominant";
      if (g.includes("wild type") || g.includes("wild-type") || g.includes("natural")) return "wildtype";
      if (g.includes("recessive")) return "recessive";
      if (g.includes("selective") || g.includes("locality")) return "selective";
      if (g.includes("incomplete dominance")) return "incomplete";
      return "recessive";
    };

    const blendHex = (h1, h2) => {
      const r1 = parseInt(h1.slice(1,3),16), g1 = parseInt(h1.slice(3,5),16), b1 = parseInt(h1.slice(5,7),16);
      const r2 = parseInt(h2.slice(1,3),16), g2 = parseInt(h2.slice(3,5),16), b2 = parseInt(h2.slice(5,7),16);
      return `#${Math.round((r1+r2)/2).toString(16).padStart(2,"0")}${Math.round((g1+g2)/2).toString(16).padStart(2,"0")}${Math.round((b1+b2)/2).toString(16).padStart(2,"0")}`;
    };

    const runCalculator = () => {
      if (!calcSpeciesId || !calcParentA || !calcParentB) return;
      const sp = SPECIES.find(s => s.id === calcSpeciesId);
      const mA = sp.morphs.find(m => m.id === calcParentA);
      const mB = sp.morphs.find(m => m.id === calcParentB);
      const typeA = classifyGenetics(mA.genetics);
      const typeB = classifyGenetics(mB.genetics);
      const sameParents = mA.id === mB.id;

      let result;

      // Same morph × same morph
      if (sameParents) {
        result = {
          crossName: `Pure ${mA.name} Line`,
          summary: `Breeding two ${mA.name} together. Since both parents carry two copies of the same recessive gene, 100% of offspring will express this morph.`,
          difficulty: "Easy",
          generationsNeeded: 1,
          novelPotential: false,
          breedingTips: `This is the simplest cross. All offspring will be ${mA.name}. Good for building colony numbers or selecting the best-expressing individuals.`,
          highlightOutcome: `100% ${mA.name} offspring — ideal for establishing a pure line.`,
          f1: {
            description: "All first generation offspring express the morph.",
            outcomes: [{ phenotype: mA.name, percentage: 100, hex: mA.hex, notes: `Both parents homozygous — all offspring express ${mA.name}.` }]
          },
          f2: { description: "", outcomes: [] }
        };
      }
      // Wild type × recessive
      else if (typeA === "wildtype" || typeB === "wildtype") {
        const morphParent = typeA === "wildtype" ? mB : mA;
        result = {
          crossName: `Wild Type × ${morphParent.name}`,
          summary: `Wild type carries no morph genes. All F1 offspring will look wild type but secretly carry one copy of the ${morphParent.name} gene. Breed F1 × F1 to get 25% expressing offspring in F2.`,
          difficulty: "Moderate",
          generationsNeeded: 2,
          novelPotential: false,
          breedingTips: `Keep all F1 offspring — they are carriers. Select the healthiest F1 individuals and breed them together to produce F2. Expect roughly 1 in 4 F2 to express ${morphParent.name}.`,
          highlightOutcome: `25% of F2 offspring will express ${morphParent.name}.`,
          f1: {
            description: "All F1 look wild type but are carriers of the morph gene.",
            outcomes: [{ phenotype: "Wild Type (carrier)", percentage: 100, hex: morphParent.hex + "66", notes: `Carries one copy of ${morphParent.name} gene but does not express it. Looks wild type.` }]
          },
          f2: {
            description: "Breed F1 × F1 to reveal the hidden gene.",
            outcomes: [
              { phenotype: "Wild Type (non-carrier)", percentage: 25, hex: "#6B6B6B", notes: "Does not carry the morph gene.", isNewMorph: false },
              { phenotype: "Wild Type (carrier)", percentage: 50, hex: "#8B8B7B", notes: `Carries one copy of ${morphParent.name} — looks wild type but passes it on.`, isNewMorph: false },
              { phenotype: morphParent.name, percentage: 25, hex: morphParent.hex, notes: `Homozygous recessive — fully expresses ${morphParent.name}!`, isNewMorph: false }
            ]
          }
        };
      }
      // Co-dominant (Lava) cross
      else if (typeA === "codominant" || typeB === "codominant") {
        const lavaParent = typeA === "codominant" ? mA : mB;
        const otherParent = typeA === "codominant" ? mB : mA;
        const otherIsWild = classifyGenetics(otherParent.genetics) === "wildtype";
        result = {
          crossName: `${lavaParent.name} × ${otherParent.name}`,
          summary: `${lavaParent.name} is co-dominant — heterozygous animals show the trait visibly in F1. This makes results appear faster than recessive crosses.`,
          difficulty: "Moderate",
          generationsNeeded: 1,
          novelPotential: !otherIsWild,
          breedingTips: `Co-dominant genes are visible in the first generation — no need to wait for F2. Homozygous ${lavaParent.name} shows enhanced expression. Select the most vivid individuals for breeding.`,
          highlightOutcome: `50% of F1 will visibly show ${lavaParent.name} expression immediately.`,
          f1: {
            description: "Co-dominant gene shows in F1 — no need to wait for F2.",
            outcomes: [
              { phenotype: `${lavaParent.name} (het)`, percentage: 50, hex: blendHex(lavaParent.hex, otherParent.hex), notes: `Heterozygous — shows intermediate ${lavaParent.name} expression. Visible in F1!` },
              { phenotype: otherParent.name, percentage: 50, hex: otherParent.hex, notes: `Does not carry ${lavaParent.name} gene.` }
            ]
          },
          f2: {
            description: "Breed het × het to get homozygous enhanced expression.",
            outcomes: [
              { phenotype: otherParent.name, percentage: 25, hex: otherParent.hex, notes: "No Lava gene.", isNewMorph: false },
              { phenotype: `${lavaParent.name} (het)`, percentage: 50, hex: blendHex(lavaParent.hex, otherParent.hex), notes: "Heterozygous — intermediate expression.", isNewMorph: false },
              { phenotype: `${lavaParent.name} (hom) — Enhanced`, percentage: 25, hex: lavaParent.hex, notes: "Homozygous — maximum enhanced Lava expression!", isNewMorph: false }
            ]
          }
        };
      }
      // Two different recessive morphs
      else if (typeA === "recessive" && typeB === "recessive") {
        const blended = blendHex(mA.hex, mB.hex);
        result = {
          crossName: `${mA.name} × ${mB.name} Project`,
          summary: `Both morphs are recessive. F1 offspring will look wild type but carry both genes. In F2, there is a 1 in 16 chance of a double-recessive animal expressing both traits simultaneously — a potential new combination morph.`,
          difficulty: "Advanced",
          generationsNeeded: 2,
          novelPotential: true,
          breedingTips: `This is a multi-generation project. Keep ALL F1 offspring as they are all carriers. Breed F1 × F1 and look closely at F2 — the 1/16 double-recessive could be something never seen before. Document everything with photos.`,
          highlightOutcome: `6.25% of F2 may express BOTH ${mA.name} AND ${mB.name} simultaneously — a potential new combination morph!`,
          f1: {
            description: "All F1 look wild type but carry both recessive genes.",
            outcomes: [{ phenotype: "Wild Type (double carrier)", percentage: 100, hex: "#7A6850", notes: `Carries one copy each of ${mA.name} and ${mB.name} genes. Looks wild type but is valuable!` }]
          },
          f2: {
            description: "Breed F1 × F1 — 1 in 16 may show both traits combined.",
            outcomes: [
              { phenotype: "Wild Type", percentage: 56.25, hex: "#6B6B6B", notes: "Wild type — may or may not carry hidden genes.", isNewMorph: false },
              { phenotype: mA.name, percentage: 18.75, hex: mA.hex, notes: `Expresses ${mA.name} only.`, isNewMorph: false },
              { phenotype: mB.name, percentage: 18.75, hex: mB.hex, notes: `Expresses ${mB.name} only.`, isNewMorph: false },
              { phenotype: `${mA.name} + ${mB.name} ⭐`, percentage: 6.25, hex: blended, notes: `Double recessive — expresses BOTH traits! Potential new combination morph.`, isNewMorph: true }
            ]
          }
        };
      }
      // Selective / locality cross
      else {
        result = {
          crossName: `${mA.name} × ${mB.name}`,
          summary: `These morphs are based on selective breeding or locality differences rather than simple recessive genes. Offspring will show variable expression. Select the best-expressing individuals from each generation.`,
          difficulty: "Moderate",
          generationsNeeded: 2,
          novelPotential: false,
          breedingTips: `With selective lines, improvement comes from consistently choosing the most vibrant offspring to breed. This may take 3–5 generations to see significant results.`,
          highlightOutcome: `Variable offspring — select the most vivid individuals each generation to strengthen the line.`,
          f1: {
            description: "F1 will show variable expression between the two parent types.",
            outcomes: [
              { phenotype: `${mA.name} type`, percentage: 50, hex: mA.hex, notes: `Leans toward ${mA.name} expression.` },
              { phenotype: `${mB.name} type`, percentage: 50, hex: mB.hex, notes: `Leans toward ${mB.name} expression.` }
            ]
          },
          f2: { description: "", outcomes: [] }
        };
      }

      setCalcResult(result);
    };

    const diffColor = { Easy:"#7A9B6A", Moderate:"#C8943A", Advanced:"#9B6A3A", Expert:"#8A4A9B" };

    return (
      <div style={S.section}>
        <h1 style={S.h1}>🔬 Genetics Calculator</h1>
        <div style={{ color:"#7A6A58", fontSize:12, marginBottom:16, lineHeight:1.6 }}>
          Select a species and two parent morphs to predict offspring probabilities. Based on Punnett square genetics — recessive, co-dominant, and compound crosses.
        </div>

        {/* Step 1: Species */}
        <div style={{ ...S.card, borderColor: calcSpeciesId ? "#C8943A44" : "#2A231A" }}>
          <div style={{ color:"#C8943A", fontSize:11, marginBottom:6 }}>① Select Species</div>
          <select value={calcSpeciesId} onChange={e => { setCalcSpeciesId(e.target.value); setCalcParentA(""); setCalcParentB(""); setCalcResult(null); }} style={S.input}>
            <option value="">Choose a species…</option>
            {SPECIES.filter(s => s.morphs.length > 1).map(s => (
              <option key={s.id} value={s.id}>{s.genus} {s.species} — {s.common} ({s.morphs.length} morphs)</option>
            ))}
          </select>
        </div>

        {/* Step 2: Parents */}
        {calcSpecies && (
          <div style={{ ...S.card, borderColor:"#C8943A44" }}>
            <div style={{ color:"#C8943A", fontSize:11, marginBottom:10 }}>② Select Parent Morphs</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <div>
                <div style={{ color:"#9A8878", fontSize:10, marginBottom:4 }}>Parent A ♀</div>
                <select value={calcParentA} onChange={e => { setCalcParentA(e.target.value); setCalcResult(null); }} style={S.input}>
                  <option value="">Select morph…</option>
                  {calcMorphs.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                </select>
                {calcParentA && (() => {
                  const m = calcMorphs.find(m => m.id === calcParentA);
                  return m ? (
                    <div style={{ marginTop:6, display:"flex", alignItems:"center", gap:6 }}>
                      <div style={{ width:20, height:20, borderRadius:4, background:m.hex, border:"1px solid #ffffff22" }}/>
                      <div>
                        <div style={{ color:"#F0E8D0", fontSize:10 }}>{m.name}</div>
                        <div style={{ color:"#7A6A58", fontSize:9 }}>{m.genetics?.substring(0,45)}…</div>
                      </div>
                    </div>
                  ) : null;
                })()}
              </div>
              <div>
                <div style={{ color:"#9A8878", fontSize:10, marginBottom:4 }}>Parent B ♂</div>
                <select value={calcParentB} onChange={e => { setCalcParentB(e.target.value); setCalcResult(null); }} style={S.input}>
                  <option value="">Select morph…</option>
                  {calcMorphs.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                </select>
                {calcParentB && (() => {
                  const m = calcMorphs.find(m => m.id === calcParentB);
                  return m ? (
                    <div style={{ marginTop:6, display:"flex", alignItems:"center", gap:6 }}>
                      <div style={{ width:20, height:20, borderRadius:4, background:m.hex, border:"1px solid #ffffff22" }}/>
                      <div>
                        <div style={{ color:"#F0E8D0", fontSize:10 }}>{m.name}</div>
                        <div style={{ color:"#7A6A58", fontSize:9 }}>{m.genetics?.substring(0,45)}…</div>
                      </div>
                    </div>
                  ) : null;
                })()}
              </div>
            </div>
          </div>
        )}

        {/* Cross preview + Calculate button */}
        {calcParentA && calcParentB && (() => {
          const mA = calcMorphs.find(m => m.id === calcParentA);
          const mB = calcMorphs.find(m => m.id === calcParentB);
          return (
            <div style={{ ...S.card, background:"#0d0b08", display:"flex", alignItems:"center", gap:10, justifyContent:"center" }}>
              <div style={{ textAlign:"center" }}>
                <div style={{ width:32, height:32, borderRadius:6, background:mA.hex, border:"1px solid #ffffff22", margin:"0 auto 4px" }}/>
                <div style={{ color:"#F0E8D0", fontSize:10 }}>{mA.name}</div>
              </div>
              <div style={{ color:"#C8943A", fontSize:20 }}>×</div>
              <div style={{ textAlign:"center" }}>
                <div style={{ width:32, height:32, borderRadius:6, background:mB.hex, border:"1px solid #ffffff22", margin:"0 auto 4px" }}/>
                <div style={{ color:"#F0E8D0", fontSize:10 }}>{mB.name}</div>
              </div>
              <button onClick={runCalculator} style={{ ...S.btn(), marginLeft:12 }}>
                🧬 Calculate
              </button>
            </div>
          );
        })()}

        {/* Results */}
        {calcResult && (
          <div>
            <div style={{ ...S.card, background:"#1a1408", borderColor:"#C8943A44" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:8 }}>
                <div>
                  <div style={{ color:"#C8943A", fontSize:16, fontFamily:"Georgia,serif", marginBottom:4 }}>{calcResult.crossName}</div>
                  <div style={{ color:"#C8B8A0", fontSize:11, lineHeight:1.6, maxWidth:480 }}>{calcResult.summary}</div>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:4, alignItems:"flex-end" }}>
                  {calcResult.difficulty && <span style={S.pill(diffColor[calcResult.difficulty] || "#C8943A")}>{calcResult.difficulty}</span>}
                  {calcResult.generationsNeeded && <span style={{ color:"#7A6A58", fontSize:10 }}>~{calcResult.generationsNeeded} generation{calcResult.generationsNeeded > 1 ? "s" : ""} to target</span>}
                  {calcResult.novelPotential && <span style={S.pill("#C84A4A")}>⭐ Novel potential</span>}
                </div>
              </div>
            </div>

            {calcResult.f1?.outcomes?.length > 0 && (
              <div style={S.card}>
                <div style={S.h3}>F1 Offspring (First Generation)</div>
                <div style={{ color:"#7A6A58", fontSize:11, marginBottom:10 }}>{calcResult.f1.description}</div>
                {calcResult.f1.outcomes.map((o, i) => (
                  <div key={i} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8, padding:8, background:"#0d0b08", borderRadius:6 }}>
                    <div style={{ width:28, height:28, borderRadius:5, background:o.hex || "#6B6B6B", border:"1px solid #ffffff22", flexShrink:0 }}/>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <span style={{ color:"#F0E8D0", fontSize:12 }}>{o.phenotype}</span>
                        <span style={{ color:"#C8943A", fontSize:14, fontWeight:"bold" }}>{o.percentage}%</span>
                      </div>
                      <div style={{ color:"#7A6A58", fontSize:10, marginTop:2, lineHeight:1.4 }}>{o.notes}</div>
                    </div>
                    <div style={{ width:60, height:6, background:"#2A231A", borderRadius:3, flexShrink:0 }}>
                      <div style={{ width:`${Math.min(o.percentage,100)}%`, height:"100%", background:"#C8943A", borderRadius:3 }}/>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {calcResult.f2?.outcomes?.length > 0 && (
              <div style={S.card}>
                <div style={S.h3}>F2 Offspring (if F1 × F1)</div>
                <div style={{ color:"#7A6A58", fontSize:11, marginBottom:10 }}>{calcResult.f2.description}</div>
                {calcResult.f2.outcomes.map((o, i) => (
                  <div key={i} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8, padding:8, background:"#0d0b08", borderRadius:6, borderLeft: o.isNewMorph ? "3px solid #C84A4A" : "none" }}>
                    <div style={{ width:28, height:28, borderRadius:5, background:o.hex || "#6B6B6B", border:"1px solid #ffffff22", flexShrink:0 }}/>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:4, flexWrap:"wrap" }}>
                        <span style={{ color: o.isNewMorph ? "#C84A4A" : "#F0E8D0", fontSize:12 }}>{o.phenotype}</span>
                        <span style={{ color:"#C8943A", fontSize:14, fontWeight:"bold" }}>{o.percentage}%</span>
                      </div>
                      <div style={{ color:"#7A6A58", fontSize:10, marginTop:2, lineHeight:1.4 }}>{o.notes}</div>
                      {o.isNewMorph && <div style={{ color:"#C84A4A", fontSize:9, marginTop:2 }}>⭐ Potential new / undocumented morph</div>}
                    </div>
                    <div style={{ width:60, height:6, background:"#2A231A", borderRadius:3, flexShrink:0 }}>
                      <div style={{ width:`${Math.min(o.percentage,100)}%`, height:"100%", background: o.isNewMorph ? "#C84A4A" : "#C8943A", borderRadius:3 }}/>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {calcResult.highlightOutcome && (
              <div style={{ ...S.card, background:"#1A1408", borderColor:"#C8943A44" }}>
                <div style={{ color:"#C8943A", fontSize:11, marginBottom:4 }}>🏆 Most Exciting Outcome</div>
                <div style={{ color:"#F0E8D0", fontSize:12, lineHeight:1.6 }}>{calcResult.highlightOutcome}</div>
              </div>
            )}
            {calcResult.breedingTips && (
              <div style={{ ...S.card, background:"#0d0b08" }}>
                <div style={{ color:"#7A9B6A", fontSize:11, marginBottom:4 }}>🌿 Breeding Tips</div>
                <div style={{ color:"#A09880", fontSize:11, lineHeight:1.6 }}>{calcResult.breedingTips}</div>
              </div>
            )}
            <button onClick={() => setSection("projects")} style={{ ...S.btn("#7A9B6A"), width:"100%", marginTop:4 }}>
              🧬 Start a Project for this Cross →
            </button>
          </div>
        )}
      </div>
    );
  };


  // ── RENDER ──────────────────────────────────────────────────────────────────
  return (
    <div style={S.app}>
      {section==="home" && <HomeSection />}
      {section==="database" && <DatabaseSection />}
      {section==="gallery" && <GallerySection />}
      {section==="projects" && <ProjectsSection />}
      {section==="identify" && <IDSection />}
      {section==="calculator" && <CalcSection />}

      <nav style={S.nav}>
        {[
          { id:"home", icon:"🏠", label:"Home" },
          { id:"database", icon:"📚", label:"Database" },
          { id:"identify", icon:"🔍", label:"Identify" },
          { id:"calculator", icon:"🔬", label:"Calculator" },
          { id:"gallery", icon:"🎴", label:"Gallery" },
          { id:"projects", icon:"🧬", label:"Projects" },
        ].map(n => (
          <button key={n.id} onClick={() => { setSection(n.id); setSelectedSpecies(null); setSelectedMorph(null); setSelectedProject(null); }} style={S.navBtn(section===n.id)}>
            <span style={{ fontSize:18 }}>{n.icon}</span>
            <span>{n.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<IsoMorphApp />);
  </script>
</body>
</html>
